name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests with duration logging
        id: test
        run: |
          start=$(date +%s)
          npm test
          end=$(date +%s)
          duration=$((end - start))
          echo "Test duration: ${duration}s"

      - name: Summary
        if: always()
        run: echo "CI job completed with status ${{ job.status }}"